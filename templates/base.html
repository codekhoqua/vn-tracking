<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VN-Tracking Dashboard - Quản lý tiến độ Team Việt Nam">
    <title>{% block title %}VN-Tracking Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=125">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    {% block head %}{% endblock %}
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', filename='js/app.js') }}?v=125"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
